name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    name: Complete CI/CD Pipeline
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================
      # Setup: Checkout & Install Toolchain
      # ============================================================
      
      - name: Checkout code
        uses: actions/checkout@v4.5.0
        with:
          fetch-depth: 0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      
      # ============================================================
      # System Dependencies (once for entire pipeline)
      # ============================================================
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlite3-dev \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libcairo2-dev \
            libpango1.0-dev
      
      # ============================================================
      # Create logs directory
      # ============================================================
      
      - name: Create logs directory
        run: mkdir -p .github/ci-logs
      
      # ============================================================
      # PHASE 1: Code Quality Checks
      # ============================================================
      
      - name: Check code formatting
        run: |
          set +e
          cargo fmt -- --check 2>&1 | tee .github/ci-logs/fmt.log
          FMT_EXIT=$?
          set -e
          echo "Exit code: $FMT_EXIT" >> .github/ci-logs/fmt.log
          exit $FMT_EXIT
        continue-on-error: true
      
      - name: Run clippy lints
        run: |
          set +e
          cargo clippy --all-targets 2>&1 | tee .github/ci-logs/clippy.log
          CLIPPY_EXIT=$?
          set -e
          echo "Exit code: $CLIPPY_EXIT" >> .github/ci-logs/clippy.log
          exit $CLIPPY_EXIT
        continue-on-error: true
      
      # ============================================================
      # PHASE 2: Build (once)
      # ============================================================
      
      - name: Build project
        run: |
          set +e
          cargo build --release 2>&1 | tee .github/ci-logs/build.log
          BUILD_EXIT=$?
          set -e
          echo "Exit code: $BUILD_EXIT" >> .github/ci-logs/build.log
          exit $BUILD_EXIT
        continue-on-error: true
      
      # ============================================================
      # PHASE 3: Testing
      # ============================================================
      
      - name: Run tests
        run: |
          set +e
          cargo test --verbose 2>&1 | tee .github/ci-logs/tests.log
          TEST_EXIT=$?
          set -e
          echo "Exit code: $TEST_EXIT" >> .github/ci-logs/tests.log
          exit $TEST_EXIT
        continue-on-error: true
      
      # ============================================================
      # PHASE 4: Security & Documentation
      # ============================================================
      
      - name: Security audit
        run: |
          cargo install cargo-audit
          set +e
          cargo audit 2>&1 | tee .github/ci-logs/audit.log
          AUDIT_EXIT=$?
          set -e
          echo "Exit code: $AUDIT_EXIT" >> .github/ci-logs/audit.log
          exit $AUDIT_EXIT
        continue-on-error: true
      
      - name: Build documentation
        run: |
          set +e
          cargo doc --no-deps 2>&1 | tee .github/ci-logs/docs.log
          DOCS_EXIT=$?
          set -e
          echo "Exit code: $DOCS_EXIT" >> .github/ci-logs/docs.log
          exit $DOCS_EXIT
        env:
          RUSTDOCFLAGS: "-W missing-docs"
        continue-on-error: true
      
      # ============================================================
      # PHASE 5: Coverage (optional, non-blocking)
      # ============================================================
      
      - name: Generate code coverage
        run: |
          set +e
          cargo install cargo-tarpaulin 2>&1 | tee .github/ci-logs/coverage-install.log
          cargo tarpaulin --out Xml --output-dir coverage --skip-clean 2>&1 | tee -a .github/ci-logs/coverage.log
          COVERAGE_EXIT=$?
          set -e
          echo "Exit code: $COVERAGE_EXIT" >> .github/ci-logs/coverage.log
          exit $COVERAGE_EXIT
        continue-on-error: true
      
      # ============================================================
      # FINAL PHASE: Store Results
      # ============================================================
      
      - name: Create comprehensive results file
        if: always()
        run: |
          mkdir -p .github/ci-results
          TIMESTAMP=$(date -u +%Y-%m-%d_%H-%M-%S)
          RESULTS_FILE=".github/ci-results/results_${TIMESTAMP}_${{ github.run_id }}.txt"
          
          cat > "$RESULTS_FILE" << 'RESULTS'
          ============================================================
          CI/CD Pipeline Results
          ============================================================
          
          RESULTS
          
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$RESULTS_FILE"
          echo "Commit: ${{ github.sha }}" >> "$RESULTS_FILE"
          echo "Branch: ${{ github.ref }}" >> "$RESULTS_FILE"
          echo "Run ID: ${{ github.run_id }}" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "Detailed Logs" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"
          
          # Append all logs
          for log in .github/ci-logs/*.log; do
            if [ -f "$log" ]; then
              echo "--- $(basename $log) ---" >> "$RESULTS_FILE"
              cat "$log" >> "$RESULTS_FILE"
              echo "" >> "$RESULTS_FILE"
            fi
          done
          
          echo "Results file created at: $RESULTS_FILE"
      
      - name: Clean up individual log files
        if: always()
        run: |
          # Delete individual log files (consolidated into results file)
          rm -rf .github/ci-logs
          echo "Individual log files deleted (consolidated into results file)"
      
      - name: Commit and push results
        if: always()
        run: |
          git config --global user.email "ci-pipeline@anthropic.com"
          git config --global user.name "CI Pipeline"
          
          # Only add results directory (ci-logs already deleted)
          git add .github/ci-results/ 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            RUN_ID="${{ github.run_id }}"
            
            git commit -m "ci: unified pipeline results for run $RUN_ID at $TIMESTAMP"
            git push origin main 2>&1 || echo "Could not push results"
          else
            echo "No result changes to commit"
          fi
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
