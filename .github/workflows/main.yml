name: Main CI Pipeline

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  checks: read

jobs:
  # ============================================================
  # PHASE 1: Independent checks (run in parallel)
  # ============================================================
  
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  ci:
    name: CI (Build & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlite3-dev pkg-config \
            libglib2.0-dev libgtk-3-dev \
            libgdk-pixbuf2.0-dev libcairo2-dev libpango1.0-dev
      - name: Lint and test
        run: cargo test --verbose
        continue-on-error: true
      - name: Build
        run: cargo build --release
        continue-on-error: true
      - name: Security audit
        run: cargo audit
        continue-on-error: true
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/
          retention-days: 7

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlite3-dev pkg-config \
            libglib2.0-dev libgtk-3-dev \
            libgdk-pixbuf2.0-dev libcairo2-dev libpango1.0-dev
      - name: Build documentation
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-W missing-docs"
      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: documentation
          path: target/doc/
          retention-days: 7

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --out Xml
        continue-on-error: true
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # PHASE 2: Results collection (ONLY runs after all above complete)
  # ============================================================
  
  store-results:
    name: Store Results & Artifacts
    needs: [format-check, ci, documentation, code-coverage]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true
      
      - name: Create comprehensive results
        run: |
          mkdir -p .github/ci-results
          TIMESTAMP=$(date -u +%Y-%m-%d_%H-%M-%S)
          RESULTS_FILE=".github/ci-results/ci_${TIMESTAMP}_${{ github.run_id }}.txt"
          
          cat > "$RESULTS_FILE" << 'RESULTS'
          ============================================================
          CI/CD Pipeline Results
          ============================================================
          
          RESULTS
          
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$RESULTS_FILE"
          echo "Commit: ${{ github.sha }}" >> "$RESULTS_FILE"
          echo "Branch: ${{ github.ref }}" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"
          echo "Job Results:" >> "$RESULTS_FILE"
          echo "- format-check: ${{ needs.format-check.result }}" >> "$RESULTS_FILE"
          echo "- ci: ${{ needs.ci.result }}" >> "$RESULTS_FILE"
          echo "- documentation: ${{ needs.documentation.result }}" >> "$RESULTS_FILE"
          echo "- code-coverage: ${{ needs.code-coverage.result }}" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"
          echo "All artifacts downloaded and stored in .github/ci-results/" >> "$RESULTS_FILE"
          
          cat "$RESULTS_FILE"
      
      - name: Commit results
        run: |
          git config --global user.email "ci-results@anthropic.com"
          git config --global user.name "CI Pipeline"
          
          git add .github/ci-results/ 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "ci: pipeline results for run ${{ github.run_id }}

All jobs completed:
- Format check: ${{ needs.format-check.result }}
- CI (Build & Test): ${{ needs.ci.result }}
- Documentation: ${{ needs.documentation.result }}
- Code Coverage: ${{ needs.code-coverage.result }}

Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
Commit: ${{ github.sha }}"
            
            git push origin main 2>&1 || echo "Could not push"
          else
            echo "No changes to commit"
          fi
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
