name: Store Workflow Results

on:
  workflow_run:
    workflows: ["CI", "Documentation", "Code Coverage", "Debug Fmt"]
    types: [completed]  # Runs AFTER each workflow completes (success or failure)

permissions:
  contents: write
  checks: read

jobs:
  collect-and-store:
    name: Collect & Store All Results
    runs-on: ubuntu-latest
    # This job ALWAYS runs, regardless of whether triggered workflows succeeded or failed
    # workflow_run triggers ensure this runs AFTER the specified workflows complete
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download CI artifacts (even if failed)
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: ci-artifacts
        continue-on-error: true
      
      - name: Download Documentation artifacts (even if failed)
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: documentation.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: doc-artifacts
        continue-on-error: true
      
      - name: Create comprehensive workflow results with actual output
        run: |
          mkdir -p .github/ci-results .github/build-outputs .github/ci-errors
          
          # Generate timestamp for unique filenames
          TIMESTAMP=$(date -u +%Y-%m-%d_%H-%M-%S)
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          
          # Create workflow-specific timestamped filenames (CI vs Documentation)
          if [[ "$WORKFLOW_NAME" == "CI" ]]; then
            RESULTS_FILE=".github/ci-results/ci_${TIMESTAMP}_${{ github.event.workflow_run.id }}.txt"
          elif [[ "$WORKFLOW_NAME" == "Documentation" ]]; then
            RESULTS_FILE=".github/ci-results/docs_${TIMESTAMP}_${{ github.event.workflow_run.id }}.txt"
          else
            RESULTS_FILE=".github/ci-results/${WORKFLOW_NAME,,}_${TIMESTAMP}_${{ github.event.workflow_run.id }}.txt"
          fi
          
          # Create main results file
          cat > "$RESULTS_FILE" << 'EOF'
          ============================================================
          GitHub Actions Workflow Results
          ============================================================
          
          EOF
          
          echo "Workflow: ${{ github.event.workflow_run.name }}" >> "$RESULTS_FILE"
          echo "Run ID: ${{ github.event.workflow_run.id }}" >> "$RESULTS_FILE"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$RESULTS_FILE"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}" >> "$RESULTS_FILE"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}" >> "$RESULTS_FILE"
          echo "Event: ${{ github.event.workflow_run.event }}" >> "$RESULTS_FILE"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}" >> "$RESULTS_FILE"
          echo "Actor: ${{ github.event.workflow_run.actor.login }}" >> "$RESULTS_FILE"
          
          echo "" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "CI Build Output (Last 300 lines):" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"
          
          # Copy test output to build-outputs and include in results
          if [ -f "ci-artifacts/test-results/test-output.txt" ]; then
            cp "ci-artifacts/test-results/test-output.txt" ".github/build-outputs/test-output.txt"
            tail -300 "ci-artifacts/test-results/test-output.txt" >> "$RESULTS_FILE"
          elif [ -f "ci-artifacts/test-results/FAILURE_REPORT.txt" ]; then
            cp "ci-artifacts/test-results/FAILURE_REPORT.txt" ".github/build-outputs/FAILURE_REPORT.txt"
            echo "Failure Report:" >> "$RESULTS_FILE"
            cat "ci-artifacts/test-results/FAILURE_REPORT.txt" >> "$RESULTS_FILE"
          else
            echo "No CI test output captured" >> "$RESULTS_FILE"
          fi
          
          echo "" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "Documentation Build Output:" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"
          
          if [ -d "doc-artifacts" ]; then
            find doc-artifacts -type f -name "*.txt" -o -name "*.log" | head -5 | while read file; do
              echo "File: $file" >> "$RESULTS_FILE"
              tail -50 "$file" >> "$RESULTS_FILE"
              echo "" >> "$RESULTS_FILE"
            done
          else
            echo "No documentation artifacts found" >> "$RESULTS_FILE"
          fi
          
          echo "" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "All Artifacts:" >> "$RESULTS_FILE"
          echo "============================================================" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"
          
          echo "CI Artifacts:" >> "$RESULTS_FILE"
          if [ -d ci-artifacts ]; then
            find ci-artifacts -type f | sed 's|^|  - |' >> "$RESULTS_FILE"
          else
            echo "  (none)" >> "$RESULTS_FILE"
          fi
          
          echo "" >> "$RESULTS_FILE"
          echo "Documentation Artifacts:" >> "$RESULTS_FILE"
          if [ -d doc-artifacts ]; then
            find doc-artifacts -type f | sed 's|^|  - |' >> "$RESULTS_FILE"
          else
            echo "  (none)" >> "$RESULTS_FILE"
          fi
          
          echo "" >> "$RESULTS_FILE"
          echo "View full logs at:" >> "$RESULTS_FILE"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" >> "$RESULTS_FILE"
          
          echo "Results file created:"
          cat "$RESULTS_FILE"
      
      - name: Extract and store error details
        if: always()
        run: |
          mkdir -p .github/ci-errors
          
          # Extract failure reports from CI
          if [ -f "ci-artifacts/test-results/FAILURE_REPORT.txt" ]; then
            cp "ci-artifacts/test-results/FAILURE_REPORT.txt" ".github/ci-errors/latest-failure.txt"
            TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
            cp "ci-artifacts/test-results/FAILURE_REPORT.txt" \
              ".github/ci-errors/failure_${TIMESTAMP}_${{ github.event.workflow_run.id }}.txt"
          fi
          
          # Copy any other error files
          find ci-artifacts -name "*FAILURE*" -o -name "*ERROR*" -o -name "*error*" 2>/dev/null | \
            while read file; do
              filename=$(basename "$file")
              cp "$file" ".github/ci-errors/$filename" 2>/dev/null || true
            done
          
          echo "Error files stored:"
          ls -lh .github/ci-errors/ || echo "No error files"
      
      - name: Commit all results in single commit
        if: always()
        run: |
          git config --global user.email "ci-results@anthropic.com"
          git config --global user.name "Unified CI Results"
          
          # Stage all files
          git add .github/ci-results/ .github/build-outputs/ .github/ci-errors/ 2>/dev/null || true
          
          # Show what will be committed
          echo "Files to commit:"
          git diff --cached --name-only
          
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "ci: unified results for workflows (run ${{ github.event.workflow_run.id }})

Batched workflow results:
- Workflow: ${{ github.event.workflow_run.name }}
- Conclusion: ${{ github.event.workflow_run.conclusion }}
- Run ID: ${{ github.event.workflow_run.id }}
- Commit: ${{ github.event.workflow_run.head_sha }}

Contents:
- Complete CI test output
- Documentation build results
- Error reports and diagnostics
- Artifact listings"
            
            git push origin main 2>&1 || git push origin $(git rev-parse --abbrev-ref HEAD) 2>&1 || echo "Could not push"
            echo "Commit pushed successfully"
          else
            echo "No changes to commit"
          fi
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

