name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt -- --check

  lint-and-test:
    name: Lint & Test (with cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config
      
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Run tests
        run: cargo test --all-features --verbose
      
      - name: Build documentation (check only)
        run: cargo doc --no-deps --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "-W missing-docs"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: p2p_chat_example
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_name: p2p_chat_example
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_name: p2p_chat_example
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config
      
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binary
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          if-no-files-found: ignore
          retention-days: 7

  build-minimal:
    name: Build (Minimal Feature Set)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config
      
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Build with basic features only
        run: cargo build --release --no-default-features --features basic,mdns,sqlite_bundled
      
      - name: Check binary size
        run: |
          ls -lh target/release/p2p_chat_example
          echo "Binary size: $(du -h target/release/p2p_chat_example | cut -f1)"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: rustsec/audit-check-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
