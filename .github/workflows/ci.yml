name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: |
          set +e
          cargo fmt -- --check 2>&1 | tee fmt-output.txt
          FMT_EXIT=$?
          set -e
          
          if [ $FMT_EXIT -ne 0 ]; then
            echo "=== FORMATTING CHECK FAILED ===" > fmt-error.txt
            echo "Exit Code: $FMT_EXIT" >> fmt-error.txt
            echo "" >> fmt-error.txt
            echo "=== Output ===" >> fmt-error.txt
            cat fmt-output.txt >> fmt-error.txt
            echo "" >> fmt-error.txt
            echo "To fix formatting, run: cargo fmt" >> fmt-error.txt
            exit $FMT_EXIT
          fi
      
      - name: Save fmt errors on failure
        if: failure()
        run: |
          mkdir -p fmt-results
          if [ -f fmt-error.txt ]; then
            cp fmt-error.txt fmt-results/
          fi
          if [ -f fmt-output.txt ]; then
            cp fmt-output.txt fmt-results/
          fi
      
      - name: Upload fmt results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmt-results
          path: fmt-results/
        continue-on-error: true

  lint-and-test:
    name: Lint & Test (with cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config libglib2.0-dev libgtk-3-dev
        run: |
          set +e
          cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy-output.txt
          CLIPPY_EXIT=$?
          set -e
          
          if [ $CLIPPY_EXIT -ne 0 ]; then
            echo "=== CLIPPY ERRORS ===" > clippy-errors.txt
            echo "Exit Code: $CLIPPY_EXIT" >> clippy-errors.txt
            echo "" >> clippy-errors.txt
            cat clippy-output.txt >> clippy-errors.txt
            exit $CLIPPY_EXIT
          fi
      
      - name: Run tests (with output capture)
        run: |
          mkdir -p test-results
          set +e
          cargo test --all-features --verbose 2>&1 | tee test-results/test-output.txt
          TEST_EXIT=$?
          set -e
          echo "Test exit code: $TEST_EXIT" >> test-results/test-output.txt
          
          if [ $TEST_EXIT -ne 0 ]; then
            echo "TESTS FAILED!" > test-results/FAILURE.txt
            echo "Exit Code: $TEST_EXIT" >> test-results/FAILURE.txt
            echo "Run: ${{ github.run_id }}" >> test-results/FAILURE.txt
            echo "SHA: ${{ github.sha }}" >> test-results/FAILURE.txt
            exit $TEST_EXIT
          fi
      
      - name: Capture explicit failures
        if: failure()
        run: |
          mkdir -p test-results
          {
            echo "=== CI WORKFLOW FAILURE REPORT ==="
            echo "Run ID: ${{ github.run_id }}"
            echo "Commit: ${{ github.sha }}"
            echo "Event: ${{ github.event_name }}"
            echo ""
            
            # Clippy errors
            if [ -f clippy-errors.txt ]; then
              echo "=== CLIPPY ERRORS ===" 
              cat clippy-errors.txt
              echo ""
            fi
            
            # Test output
            echo "=== TEST OUTPUT (last 100 lines) ==="
            if [ -f test-results/test-output.txt ]; then
              tail -100 test-results/test-output.txt
            else
              echo "No test output captured"
            fi
          } > test-results/FAILURE_REPORT.txt
          
          cat test-results/FAILURE_REPORT.txt
      
      - name: Build documentation (check only)
        run: cargo doc --no-deps --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "-W missing-docs"
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
        continue-on-error: true

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: p2p_chat_example
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_name: p2p_chat_example
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_name: p2p_chat_example
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config libglib2.0-dev libgtk-3-dev
      
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binary
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          if-no-files-found: ignore
          retention-days: 7

  build-minimal:
    name: Build (Minimal Feature Set)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config libglib2.0-dev
      
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Build with basic features only
        run: cargo build --release --no-default-features --features basic,mdns,sqlite_bundled
      
      - name: Check binary size
        run: |
          ls -lh target/release/p2p_chat_example
          echo "Binary size: $(du -h target/release/p2p_chat_example | cut -f1)"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: rustsec/audit-check-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  capture-results:
    name: Capture CI Results
    runs-on: ubuntu-latest
    needs: [fmt, lint-and-test, build, build-minimal]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ci-artifacts
        continue-on-error: true
      
      - name: Create results summary
        run: |
          mkdir -p .github/ci-results
          
          cat > .github/ci-results/latest-run.txt << 'RESULTS'
          CI Results - $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          =====================================
          
          Run ID: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
          
          Jobs Status:
          - fmt: ${{ needs.fmt.result }}
          - lint-and-test: ${{ needs.lint-and-test.result }}
          - build: ${{ needs.build.result }}
          - build-minimal: ${{ needs.build-minimal.result }}
          
          Artifacts Available:
          RESULTS
          
          if [ -d ci-artifacts ]; then
            find ci-artifacts -type f | sed 's/^/  - /' >> .github/ci-results/latest-run.txt
          else
            echo "  (none)" >> .github/ci-results/latest-run.txt
          fi
      
      - name: Create detailed job matrix
        run: |
          cat > .github/ci-results/build-matrix.txt << 'MATRIX'
          Build Matrix Results
          ====================
          
          Platforms Tested:
          - Linux x86_64 (GNU)
          - macOS x86_64
          - macOS ARM64 (Apple Silicon)
          - Minimal Feature Set (embedded)
          
          Build Status:
          MATRIX
          
          if [ -d ci-artifacts ]; then
            ls -lh ci-artifacts/*/  2>/dev/null | grep -E "x86_64|aarch64|minimal" | sed 's/^/  /' >> .github/ci-results/build-matrix.txt || echo "  Builds in progress or not yet available" >> .github/ci-results/build-matrix.txt
          fi
      
      - name: Commit results back to repo
        run: |
          git config --global user.email "claude@anthropic.com"
          git config --global user.name "Claude CI"
          
          if [ -f .github/ci-results/latest-run.txt ]; then
            git add .github/ci-results/
            git commit -m "ci: record workflow results for run ${{ github.run_id }}" || echo "No changes to commit"
            git push || echo "Push failed - may already be up to date"
          fi
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
