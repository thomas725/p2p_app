name: Capture & Store Logs

on:
  workflow_run:
    workflows: ["CI", "Documentation", "Coverage"]
    types: [completed]

permissions:
  contents: write
  checks: read

jobs:
  capture-logs:
    name: Capture Workflow Logs
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download workflow artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ${{ github.event.workflow_run.workflow_id }}
          run_id: ${{ github.event.workflow_run.id }}
          path: workflow-artifacts
        continue-on-error: true
      
      - name: Get workflow run info
        id: workflow_info
        run: |
          echo "workflow_name=${{ github.event.workflow_run.name }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "conclusion=${{ github.event.workflow_run.conclusion }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%d_%H-%M-%S)" >> $GITHUB_OUTPUT
      
      - name: Create comprehensive results log
        run: |
          mkdir -p .github/workflow-logs
          LOG_FILE=".github/workflow-logs/${{ steps.workflow_info.outputs.timestamp }}_${{ steps.workflow_info.outputs.run_id }}.md"
          
          cat > "$LOG_FILE" << 'EOF'
          # Workflow Run Results
          
          **Workflow**: ${{ steps.workflow_info.outputs.workflow_name }}
          **Run ID**: ${{ steps.workflow_info.outputs.run_id }}
          **Conclusion**: ${{ steps.workflow_info.outputs.conclusion }}
          **Timestamp**: ${{ steps.workflow_info.outputs.timestamp }}
          **Commit**: ${{ github.event.workflow_run.head_commit.message }}
          **Branch**: ${{ github.event.workflow_run.head_branch }}
          
          ## Summary
          
          - **Status**: ${{ steps.workflow_info.outputs.conclusion }}
          - **Triggered By**: ${{ github.event.workflow_run.event }}
          - **Head SHA**: ${{ github.event.workflow_run.head_sha }}
          
          ## Artifacts Found
          
          EOF
          
          if [ -d workflow-artifacts ]; then
            echo "### Available Artifacts:" >> "$LOG_FILE"
            find workflow-artifacts -type f -exec ls -lh {} \; | awk '{print "- " $9 " (" $5 ")"}' >> "$LOG_FILE" || echo "- (none)" >> "$LOG_FILE"
          else
            echo "### No artifacts captured" >> "$LOG_FILE"
          fi
          
          echo "" >> "$LOG_FILE"
          echo "## View Details" >> "$LOG_FILE"
          echo "Full workflow logs available at: https://github.com/${{ github.repository }}/actions/runs/${{ steps.workflow_info.outputs.run_id }}" >> "$LOG_FILE"
      
      - name: Store build artifacts
        if: always()
        run: |
          mkdir -p .github/build-outputs
          
          if [ -d workflow-artifacts ]; then
            # Copy any binary artifacts
            find workflow-artifacts -name "*binary*" -type d -exec cp -r {} .github/build-outputs/ \; || true
            
            # Copy test results if available
            find workflow-artifacts -name "*.txt" -o -name "*.json" -o -name "*.log" | xargs -I {} cp {} .github/build-outputs/ || true
          fi
      
      - name: Commit logs to repository
        run: |
          git config --global user.email "claude@anthropic.com"
          git config --global user.name "Claude CI Logger"
          
          git add .github/workflow-logs/ .github/build-outputs/ 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: record workflow logs for run ${{ steps.workflow_info.outputs.run_id }} (${{ steps.workflow_info.outputs.conclusion }})" || true
            git push origin main -f || echo "Push to main failed, trying current branch"
            git push || echo "Push failed"
          fi
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
